<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Archery Score</title>
    <style>
        :root { --primary: #4CAF50; --accent: #E64A19; --bg: #f4f4f9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 20px; background: var(--bg); margin: 0; user-select: none; transition: background-color 0.5s ease; -webkit-touch-callout: none; touch-action: manipulation; }
        .card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; color: #333; }
        input, button { width: 100%; padding: 15px; margin: 8px 0; font-size: 1.1em; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; -webkit-appearance: none; }
        button { font-weight: bold; cursor: pointer; transition: transform 0.1s; border: none; }
        button:active { transform: scale(0.95); }
        .green { background: var(--primary); color: white; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* Profi Logo a Nadpis */
        #logo-main { font-size: 5em; margin-bottom: 5px; text-shadow: 2px 4px 8px rgba(0,0,0,0.1); }
        #t-title { font-size: 2.2em; font-weight: 900; margin-top: 0; margin-bottom: 20px; color: #222; text-transform: uppercase; letter-spacing: -1px; text-shadow: 1px 1px 0px rgba(0,0,0,0.1); }

        .footer-counter { margin-top: 40px; border-top: 1px solid #ddd; padding-top: 15px; opacity: 0.8; font-size: 0.9em; }
        .global-num { color: var(--accent); font-weight: bold; }
        .lang-switch { margin-top: 15px; font-size: 0.9em; }
        .lang-btn { cursor: pointer; padding: 5px 10px; text-decoration: underline; color: #2196F3; font-weight: bold; }

        #info { font-size: 1.1em; margin-bottom: 5px; }
        .highlight { font-size: 2.2em; color: var(--accent); font-weight: 900; vertical-align: middle; line-height: 1; }
        .arrow-num { font-size: 1.6em; font-weight: bold; color: #333; vertical-align: middle; }
        
        #graphContainer { display: flex; align-items: flex-end; height: 180px; overflow-x: auto; gap: 8px; padding: 25px 10px 10px 10px; background: #fff; border-radius: 10px; margin-bottom: 10px; border: 1px solid #eee; position: relative; }
        .bar-wrapper { display: flex; flex-direction: column; align-items: center; min-width: 45px; height: 100%; justify-content: flex-end; position: relative; }
        .bar { width: 25px; background: var(--primary); border-radius: 4px 4px 0 0; position: relative; min-height: 2px; }
        .bar.latest { background: #FF9800; }
        .crown { position: absolute; top: -22px; font-size: 18px; }
        .bar-label { font-size: 0.7em; color: #666; margin-top: 4px; }
        .bar-pts { font-size: 0.75em; font-weight: bold; margin-bottom: 2px; }

        #s2, #sHistory, #sFinish { display: none; }
        
        .current-target-arrows { font-size: 0.85em; color: #2196F3; font-weight: bold; background: #e3f2fd; padding: 2px 6px; border-radius: 4px; }
        .res-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
        .avg-tag { font-size: 0.75em; color: #666; font-weight: normal; }
        .history-item { text-align: left; padding: 15px 12px; border-bottom: 1px solid #eee; background: white; margin-bottom: 5px; border-radius: 10px; cursor: pointer; transition: opacity 0.3s; -webkit-tap-highlight-color: transparent; }
        .history-item:active { opacity: 0.6; }
        .h-top { display: flex; justify-content: space-between; align-items: center; }
        .h-score { font-size: 1.6em; font-weight: 900; color: var(--accent); }
        .h-details { display: none; margin-top: 10px; border-top: 1px dashed #ccc; padding-top: 10px; }
        .detail-row { display: grid; grid-template-columns: 1fr 2fr 1fr; padding: 5px 0; font-size: 0.85em; font-family: monospace; border-bottom: 1px solid #f9f9f9; }
        .share-btn-small { background: #2196F3; color: white; padding: 12px; margin-top: 15px; font-size: 0.9em; border-radius: 8px; width: 100%; }
        .hits-summary { font-size: 0.8em; color: #555; background: #f0f0f0; padding: 6px; border-radius: 6px; margin-top: 8px; }
    </style>
</head>
<body>

    <div id="s1">
        <div id="logo-main">🎯</div>
        <h2 id="t-title">Archery Score</h2>
        <div class="card">
            <input type="number" id="inT" placeholder="Počet terčů" inputmode="numeric">
            <input type="number" id="inA" placeholder="Šípů na terč" inputmode="numeric">
            <input type="text" id="inN" placeholder="Jméno střelce">
            <button id="t-addBtn" class="green" type="button" onclick="addArcher()">PŘIDAT STŘELCE</button>
            <div id="listDisplay" style="margin: 10px 0; font-weight: bold;">Střelci: žádní</div>
        </div>
        <button id="t-startBtn" class="green" style="background: #222;" type="button" onclick="startRace()">START ZÁVODU</button>
        <button id="t-histBtn" style="background: #fff; color: #333; margin-top:20px; border: 1px solid #ccc;" type="button" onclick="showHistory()">HISTORIE</button>

        <div class="footer-counter">
            <div><span id="t-globLabel">Globálně vystřeleno:</span> <span id="globalCounter" class="global-num">...</span> <span id="t-arrowsLabel">šípů</span></div>
            <div style="margin-top:5px;"><span id="t-globRaceLabel">Ukončeno závodů:</span> <span id="globalRaces" class="global-num">...</span></div>
            <div class="lang-switch">
                <span class="lang-btn" onclick="changeLang('cs')">CZ</span> | 
                <span class="lang-btn" onclick="changeLang('en')">EN</span>
            </div>
            <div style="font-size: 0.7em; color: #aaa; margin-top: 10px;">by LiborPribor</div>
        </div>
    </div>

    <div id="s2">
        <div id="info" style="font-weight: bold;"></div>
        <h1 id="who" style="font-size: 2.5em; margin: 10px 0; text-transform: uppercase; letter-spacing: 2px;"></h1>
        <div class="grid card">
            <button onclick="bod(11)" style="background:#004D40; color:white; height: 85px;">11</button>
            <button onclick="bod(10)" style="background:#2E7D32; color:white; height: 85px;">10</button>
            <button onclick="bod(8)" style="background:#FBC02D; color:black; height: 85px;">8</button>
            <button onclick="bod(5)" style="background:#E64A19; color:white; height: 85px;">5</button>
            <button style="grid-column: span 2; background:#212121; color:white; height: 75px;" onclick="bod(0)">0</button>
        </div>
        <button id="btnUndo" style="background:#ffcc00; opacity:0.2" onclick="zpet()">ZPĚT (POSLEDNÍ ŠÍP)</button>
        <div id="res" class="card" style="text-align: left;"></div>
        <button id="t-exitBtn" style="margin-top: 20px; background:#888; color:white; font-size: 0.8em;" onclick="confirmExit()">UKONČIT ZÁVOD</button>
    </div>

    <div id="sFinish">
        <h1 id="t-finTitle">🏆 VÝSLEDKY</h1>
        <div id="finalTable" class="card" style="text-align: left;"></div>
        <button id="t-shareFinalBtn" class="green" onclick="shareFinal()">SDÍLET CELKOVÉ VÝSLEDKY</button>
        <button id="t-newBtn" style="background: #222; color:white;" onclick="confirmRestart()">NOVÝ ZÁVOD</button>
    </div>

    <div id="sHistory">
        <h3 id="t-histTitle">Historie (1. střelec)</h3>
        <p id="t-lpLabel" style="font-size: 0.7em; color: #888; margin-top: -10px;">(podržte položku pro smazání)</p>
        <div id="graphContainer"></div>
        <div id="historyList"></div>
        <button id="t-homeBtn" class="green" style="margin-top: 20px;" onclick="goHome()">ZPĚT NA ÚVOD</button>
        <button id="t-clearBtn" style="background:#ff5252; color:white; margin-top:10px; font-size: 0.8em; opacity: 0.5;" onclick="clearAllHistory()">SMAZAT VŠE</button>
    </div>

    <script>
        const DB_URL = "https://archeryscore-d138a-default-rtdb.europe-west1.firebasedatabase.app/.json";

        const texts = {
            cs: { title: "Archery Score", inT: "Počet terčů", inA: "Šípů na terč", inN: "Jméno střelce", add: "PŘIDAT STŘELCE", start: "START ZÁVODU", hist: "HISTORIE", glob: "Globálně vystřeleno:", arrows: "šípů", globR: "Ukončeno závodů:", exit: "UKONČIT ZÁVOD", fin: "🏆 VÝSLEDKY", share: "SDÍLET CELKOVÉ VÝSLEDKY", new: "NOVÝ ZÁVOD", hTitle: "Historie (1. střelec)", lp: "(podržte položku pro smazání)", home: "ZPĚT NA ÚVOD", clear: "SMAZAT VŠE", target: "Terč", arrow: "Šíp", undo: "ZPĚT (POSLEDNÍ ŠÍP)", list: "Střelci:", waiting: "čeká...", current: "PRŮBĚŽNĚ:", archersNone: "žádní", alertMiss: "Chybí údaje!", confirmExit: "Opravdu ukončit?", confirmNew: "Nový závod?", confirmClear: "Smazat všechnu historii?", confirmDel: "Smazat tento záznam z historie?", shareOne: "SDÍLET DETAILNÍ VÝSLEDEK" },
            en: { title: "Archery Score", inT: "Targets", inA: "Arrows per target", inN: "Archer name", add: "ADD ARCHER", start: "START RACE", hist: "HISTORY", glob: "Global total:", arrows: "arrows", globR: "Races finished:", exit: "EXIT RACE", fin: "🏆 RESULTS", share: "SHARE RESULTS", new: "NEW RACE", hTitle: "History (1st archer)", lp: "(long press to delete)", home: "HOME", clear: "CLEAR ALL", target: "Target", arrow: "Arrow", undo: "UNDO (LAST ARROW)", list: "Archers:", waiting: "waiting...", current: "CURRENT SCORE:", archersNone: "none", alertMiss: "Missing data!", confirmExit: "Confirm exit?", confirmNew: "New race?", confirmClear: "Clear all history?", confirmDel: "Delete this record?", shareOne: "SHARE DETAILED RESULT" }
        };

        let L = localStorage.getItem('arch_lang') || (navigator.language.startsWith('en') ? 'en' : 'cs');
        function changeLang(code) { localStorage.setItem('arch_lang', code); location.reload(); }

        function applyTexts() {
            const T = texts[L];
            document.getElementById('t-title').innerText = T.title;
            document.getElementById('inT').placeholder = T.inT;
            document.getElementById('inA').placeholder = T.inA;
            document.getElementById('inN').placeholder = T.inN;
            document.getElementById('t-addBtn').innerText = T.add;
            document.getElementById('t-startBtn').innerText = T.start;
            document.getElementById('t-histBtn').innerText = T.hist;
            document.getElementById('t-globLabel').innerText = T.glob;
            document.getElementById('t-arrowsLabel').innerText = T.arrows;
            document.getElementById('t-globRaceLabel').innerText = T.globR;
            document.getElementById('t-exitBtn').innerText = T.exit;
            document.getElementById('btnUndo').innerText = T.undo;
            document.getElementById('t-finTitle').innerText = T.fin;
            document.getElementById('t-shareFinalBtn').innerText = T.share;
            document.getElementById('t-newBtn').innerText = T.new;
            document.getElementById('t-histTitle').innerText = T.hTitle;
            document.getElementById('t-lpLabel').innerText = T.lp;
            document.getElementById('t-homeBtn').innerText = T.home;
            document.getElementById('t-clearBtn').innerText = T.clear;
            document.getElementById('listDisplay').innerHTML = T.list + " " + T.archersNone;
        }

        async function syncFirebase(arrows, races = 0) {
            try {
                const resp = await fetch(DB_URL);
                const data = await resp.json();
                let currentArrows = (data && data.global_arrows) ? data.global_arrows : 0;
                let currentRaces = (data && data.global_races) ? data.global_races : 0;
                
                if (arrows !== 0 || races !== 0) {
                    currentArrows += arrows;
                    currentRaces += races;
                    await fetch(DB_URL, { method: 'PATCH', body: JSON.stringify({ global_arrows: currentArrows, global_races: currentRaces }) });
                }
                document.getElementById('globalCounter').innerText = currentArrows.toLocaleString();
                document.getElementById('globalRaces').innerText = currentRaces.toLocaleString();
            } catch (e) { console.log("Firebase error"); }
        }

        let archers = []; let scores = {}; let hits = {}; let totalArrowsShot = {};
        let targetLog = {}; let tc, ac, ct = 1, ci = 0, as = 0, canUndo = false;
        let pressTimer;

        window.onload = function() {
            applyTexts();
            syncFirebase(0, 0);
        };

        const targetColors = ["#FFEBEE", "#E3F2FD", "#F1F8E9", "#FFF3E0", "#F3E5F5", "#E0F2F1", "#FFFDE7", "#F5F5F5"];

        function showScreen(id) {
            document.querySelectorAll('body > div').forEach(div => div.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function addArcher() {
            let input = document.getElementById('inN');
            let name = input.value.trim();
            if (name) {
                archers.push(name); scores[name] = 0; totalArrowsShot[name] = 0;
                hits[name] = {11:0, 10:0, 8:0, 5:0, 0:0}; targetLog[name] = [];
                document.getElementById('listDisplay').innerHTML = texts[L].list + " " + archers.join(", ");
                input.value = "";
            }
        }

        function startRace() {
            tc = parseInt(document.getElementById('inT').value);
            ac = parseInt(document.getElementById('inA').value);
            if (archers.length > 0 && tc > 0 && ac > 0) {
                ct = 1; ci = 0; as = 0;
                archers.forEach(n => { targetLog[n] = Array.from({length: tc}, () => []); });
                showScreen('s2');
                updateUI();
            } else { alert(texts[L].alertMiss); }
        }

        function bod(p) {
            canUndo = true;
            let name = archers[ci];
            targetLog[name][ct-1].push(p);
            scores[name] += p; 
            hits[name][p]++; 
            totalArrowsShot[name]++;
            syncFirebase(1, 0);
            document.body.style.transition = "none";
            document.body.style.filter = "brightness(0.7)";
            setTimeout(() => {
                document.body.style.transition = "filter 0.3s ease";
                document.body.style.filter = "brightness(1)";
            }, 50);
            as++;
            if (as >= ac) { as = 0; ci++; }
            if (ci >= archers.length) { 
                if (ct >= tc) { finishRace(); return; }
                ct++; ci = 0; as = 0;
            }
            updateUI();
        }

        function zpet() {
            if (!canUndo) return;
            if (as > 0) { as--; } else {
                if (ci > 0) { ci--; as = ac - 1; } else {
                    if (ct > 1) { ct--; ci = archers.length - 1; as = ac - 1; } else { return; }
                }
            }
            let name = archers[ci];
            let lastPoints = targetLog[name][ct-1].pop();
            if (lastPoints !== undefined) {
                scores[name] -= lastPoints;
                hits[name][lastPoints]--;
                totalArrowsShot[name]--;
                syncFirebase(-1, 0);
            }
            let totalLogCount = 0;
            archers.forEach(n => { targetLog[n].forEach(t => totalLogCount += t.length); });
            if (totalLogCount === 0) canUndo = false;
            updateUI();
        }

        function updateUI() {
            const T = texts[L];
            document.body.style.backgroundColor = targetColors[(ct - 1) % targetColors.length];
            document.getElementById('info').innerHTML = `${T.target}: <span class='highlight'>${ct}</span>/${tc} | ${T.arrow}: <span class="arrow-num">${as+1}</span>/${ac}`;
            document.getElementById('who').innerText = archers[ci];
            document.getElementById('btnUndo').style.opacity = canUndo ? "1" : "0.2";
            let txt = `<b>${T.current}</b><br>`;
            archers.forEach(n => {
                let displayIdx = ct - 1;
                let isOld = false;
                if (targetLog[n][displayIdx].length === 0 && ct > 1) { displayIdx = ct - 2; isOld = true; }
                let currentArrows = (targetLog[n][displayIdx] && targetLog[n][displayIdx].length > 0) 
                    ? `<span class="current-target-arrows" style="${isOld ? 'background:#eee; color:#666' : ''}">${targetLog[n][displayIdx].join(", ")}</span>` 
                    : `<span style="color:#ccc; font-size:0.8em">${T.waiting}</span>`;
                let curAvg = totalArrowsShot[n] > 0 ? (scores[n] / totalArrowsShot[n]).toFixed(1) : "0.0";
                txt += `<div class="res-row" style="${isOld ? 'opacity: 0.7' : ''}">
                            <div style="text-align:left"><b>${n}</b> ${isOld ? '<small>(T'+(ct-1)+')</small>' : ''}<br>${currentArrows}</div>
                            <div style="text-align:right">
                                <span style="font-size:1.2em; font-weight:900">${scores[n]}</span> <small>b.</small><br>
                                <span class="avg-tag">Ø ${curAvg}</span>
                            </div>
                        </div>`;
            });
            document.getElementById('res').innerHTML = txt;
        }

        function finishRace() {
            saveHistory();
            syncFirebase(0, 1); // PŘIDÁ GLOBÁLNÍ ZÁVOD
            document.body.style.backgroundColor = "#fff";
            showScreen('sFinish');
            let txt = "";
            let sorted = [...archers].sort((a,b) => scores[b] - scores[a]);
            sorted.forEach((n, i) => {
                let medal = i===0?"🥇":i===1?"🥈":i===2?"🥉":"•";
                let h = hits[n];
                let avg = (scores[n] / totalArrowsShot[n]).toFixed(2);
                txt += `<div style="margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px;">
                            ${medal} <b>${n}</b>: <span class='highlight'>${scores[n]} b.</span> (Ø ${avg})
                            <div class="hits-summary">🎯 11x<b>${h[11]}</b> | 10x<b>${h[10]}</b> | 8x<b>${h[8]}</b> | 5x<b>${h[5]}</b> | 0x<b>${h[0]}</b></div>
                        </div>`;
            });
            document.getElementById('finalTable').innerHTML = txt;
        }

        function saveHistory() {
            let h = JSON.parse(localStorage.getItem('archery_history') || "[]");
            let main = archers[0];
            h.push({ 
                id: Date.now(), 
                date: new Date().toLocaleDateString(L==='cs'?'cs-CZ':'en-US') + " " + new Date().toLocaleTimeString(L==='cs'?'cs-CZ':'en-US', {hour: '2-digit', minute:'2-digit'}), 
                pts: scores[main], 
                avg: (scores[main] / (totalArrowsShot[main] || 1)).toFixed(2), 
                details: {...hits[main]}, 
                targets: JSON.parse(JSON.stringify(targetLog[main])) 
            });
            localStorage.setItem('archery_history', JSON.stringify(h));
        }

        function shareFinal() { 
            let text = L==='cs'?"🎯 VÝSLEDKY LUKOSTŘELBY\n":"🎯 ARCHERY RESULTS\n";
            text += "━━━━━━━━━━━━━━\n";
            let sorted = [...archers].sort((a,b) => scores[b] - scores[a]);
            text += sorted.map((n, i) => {
                let h = hits[n];
                let avg = (scores[n] / totalArrowsShot[n]).toFixed(2);
                return `${i+1}. ${n}: ${scores[n]} b. (Ø ${avg})\n   [11:${h[11]}, 10:${h[10]}, 8:${h[8]}, 5:${h[5]}, 0:${h[0]}]`;
            }).join("\n\n");
            text += "\n\nby LiborPribor";
            if (navigator.share) navigator.share({ title: 'Results', text: text }); else alert(text);
        }

        function renderHistory() {
            let h = JSON.parse(localStorage.getItem('archery_history') || "[]");
            let displayData = [...h].reverse();
            let gHtml = ""; let maxPts = h.length > 0 ? Math.max(...h.map(r => r.pts)) : 0;
            displayData.slice(0, 20).forEach((r, i) => {
                let barH = maxPts > 0 ? (r.pts / maxPts) * 100 : 0;
                gHtml += `<div class="bar-wrapper">${r.pts === maxPts && maxPts > 0 ? '<span class="crown">👑</span>' : ''}<span class="bar-pts">${r.pts}</span><div class="bar ${i===0?'latest':''}" style="height:${barH}px"></div><span class="bar-label">${r.date.split(' ')[0]}</span></div>`;
            });
            document.getElementById('graphContainer').innerHTML = gHtml;
            let lHtml = "";
            displayData.forEach(r => {
                let tRows = "";
                if(r.targets) {
                    r.targets.forEach((t, idx) => {
                        let tSum = t.reduce((a,b)=>a+b,0);
                        if(t.length > 0) tRows += `<div class="detail-row"><span>T${idx+1}</span><span>(${t.join(",")})</span><b>${tSum}b</b></div>`;
                    });
                }
                lHtml += `<div class="history-item" 
                            onmousedown="startPress(${r.id})" onmouseup="endPress(${r.id})" 
                            ontouchstart="startPress(${r.id})" ontouchend="endPress(${r.id})"
                            onclick="toggleDetail(${r.id})">
                    <div class="h-top"><div><b>${r.date}</b><br><small>Ø ${r.avg}</small></div><div class="h-score">${r.pts}</div></div>
                    <div class="h-details" id="det-${r.id}" onclick="event.stopPropagation()">${tRows}<button class="share-btn-small" onclick="shareOne(${r.id})">${texts[L].shareOne}</button></div>
                </div>`;
            });
            document.getElementById('historyList').innerHTML = lHtml || (L==='cs'?"Žádné záznamy.":"No records.");
        }

        function startPress(id) {
            pressTimer = setTimeout(() => {
                if (confirm(texts[L].confirmDel)) {
                    deleteHistoryItem(id);
                }
            }, 600);
        }

        function endPress() { clearTimeout(pressTimer); }

        function deleteHistoryItem(id) {
            let h = JSON.parse(localStorage.getItem('archery_history') || "[]");
            h = h.filter(item => item.id !== id);
            localStorage.setItem('archery_history', JSON.stringify(h));
            renderHistory();
        }

        function toggleDetail(id) {
            let el = document.getElementById('det-' + id);
            if (el) el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }

        function shareOne(id) {
            let history = JSON.parse(localStorage.getItem('archery_history') || "[]");
            let r = history.find(i => i.id === id);
            if (!r) return;
            let text = `🎯 ARCHERY SCORE\n📅 ${r.date}\n━━━━━━━━━━━━\nTotal: ${r.pts} b. (Ø ${r.avg})\n\n🏹 TARGETS:\n`;
            r.targets.forEach((t, i) => { if(t.length > 0) text += `T${(i+1).toString().padStart(2,'0')}: (${t.join(",")}) = ${t.reduce((a,b)=>a+b,0)}b\n`; });
            text += "\nby LiborPribor";
            if (navigator.share) navigator.share({title: 'Archery Detail', text: text}); else alert(text);
        }

        function showHistory() { showScreen('sHistory'); renderHistory(); }
        function goHome() { location.reload(); }
        function confirmExit() { if(confirm(texts[L].confirmExit)) goHome(); }
        function confirmRestart() { if(confirm(texts[L].confirmNew)) goHome(); }
        function clearAllHistory() { if(confirm(texts[L].confirmClear)) { localStorage.removeItem('archery_history'); renderHistory(); } }
    </script>
