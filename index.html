<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lukostřelba Pro</title>
    <style>
        :root { --primary: #4CAF50; --accent: #E64A19; --bg: #f4f4f9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 20px; background: var(--bg); margin: 0; user-select: none; transition: background-color 0.3s ease; -webkit-touch-callout: none; touch-action: manipulation; }
        .card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; color: #333; }
        input, button { width: 100%; padding: 15px; margin: 8px 0; font-size: 1.1em; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; -webkit-appearance: none; }
        button { font-weight: bold; cursor: pointer; transition: transform 0.1s; border: none; }
        button:active { transform: scale(0.95); }
        .green { background: var(--primary); color: white; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        #graphContainer { display: flex; align-items: flex-end; height: 160px; overflow-x: auto; gap: 8px; padding: 15px 10px; background: #fff; border-radius: 10px; margin-bottom: 10px; border: 1px solid #eee; }
        .bar-wrapper { display: flex; flex-direction: column; align-items: center; min-width: 45px; height: 100%; justify-content: flex-end; }
        .bar { width: 25px; background: var(--primary); border-radius: 4px 4px 0 0; position: relative; }
        .bar.latest { background: #FF9800; }
        .bar-label { font-size: 0.7em; color: #666; margin-top: 4px; white-space: nowrap; }
        .bar-pts { font-size: 0.75em; font-weight: bold; margin-bottom: 2px; }

        .history-item { text-align: left; padding: 18px 12px; border-bottom: 1px solid #eee; font-size: 0.9em; display: flex; flex-direction: column; -webkit-tap-highlight-color: transparent; }
        .h-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .h-info { display: flex; flex-direction: column; }
        .h-hits { font-family: monospace; color: #666; font-size: 0.85em; margin-top: 4px; }
        .h-score { font-size: 1.8em; font-weight: 900; color: var(--accent); line-height: 1; }
        
        .h-details { display: none; margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 10px; }
        .detail-row { display: grid; grid-template-columns: 1fr 2fr 1fr; border-bottom: 1px solid #f9f9f9; padding: 5px 0; font-size: 0.85em; }

        .share-btn-small { background: #2196F3; color: white; padding: 8px; margin-top: 10px; font-size: 0.8em; border-radius: 8px; width: auto; }

        #s2, #sHistory { display: none; }
        .highlight { font-size: 1.4em; color: var(--accent); font-weight: 900; }
    </style>
</head>
<body>

    <div id="s1">
        <h2 style="margin-top:0">🎯 Lukostřelba</h2>
        <div class="card">
            <input type="number" id="inT" placeholder="Počet terčů" inputmode="numeric">
            <input type="number" id="inA" placeholder="Šípů na terč" inputmode="numeric">
            <input type="text" id="inN" placeholder="Jméno střelce">
            <button class="green" type="button" onclick="addArcher()">PŘIDAT STŘELCE</button>
            <div id="listDisplay" style="margin: 10px 0; font-weight: bold;">Střelci: žádní</div>
        </div>
        <button class="green" style="background: #222;" type="button" onclick="startRace()">START ZÁVODU</button>
        <button style="background: #fff; color: #333; margin-top:20px;" type="button" onclick="showHistory()">HISTORIE</button>
    </div>

    <div id="s2">
        <div id="info"></div>
        <h1 id="who" style="font-size: 2.5em; margin: 10px 0; text-transform: uppercase;"></h1>
        <div class="grid card">
            <button onclick="bod(11)" style="background:#004D40; color:white;">11</button>
            <button onclick="bod(10)" style="background:#2E7D32; color:white;">10</button>
            <button onclick="bod(8)" style="background:#FBC02D; color:black;">8</button>
            <button onclick="bod(5)" style="background:#E64A19; color:white;">5</button>
            <button style="grid-column: span 2; background:#212121; color:white;" onclick="bod(0)">0</button>
        </div>
        <button id="btnUndo" style="background:#ffcc00; opacity:0.2" onclick="zpet()">ZPĚT (POSLEDNÍ ŠÍP)</button>
        <div id="res" class="card" style="text-align: left;"></div>
        <div id="finishControls" style="display:none;"></div> 
        <button id="btnAbort" style="margin-top: 20px; background:#888; color:white;" onclick="confirmExit()">NOVÝ ZÁVOD / KONEC</button>
    </div>

    <div id="sHistory">
        <h3>Historie (1. střelec)</h3>
        <p style="font-size: 0.7em; color: #888;">Klikni pro detaily / Podrž pro smazání</p>
        <div id="graphContainer"></div>
        <div id="historyList" class="card"></div>
        <button class="green" onclick="goHome()">ZPĚT NA ÚVOD</button>
        <button style="background:#ff5252; color:white; margin-top:20px; font-size: 0.8em; opacity: 0.5;" onclick="clearAllHistory()">SMAZAT VŠE</button>
    </div>

    <script>
        let archers = []; let scores = {}; let hits = {}; let totalArrowsShot = {};
        let targetLog = {}; 
        let tc, ac, ct = 1, ci = 0, as = 0, lastVal = 0, canUndo = false;
        let pressTimer;

        function addArcher() {
            let input = document.getElementById('inN');
            let name = input.value.trim();
            if (name) {
                archers.push(name); scores[name] = 0;
                totalArrowsShot[name] = 0;
                hits[name] = {11:0, 10:0, 8:0, 5:0, 0:0};
                targetLog[name] = []; 
                document.getElementById('listDisplay').innerHTML = "Střelci: " + archers.join(", ");
                input.value = "";
            }
        }

        function startRace() {
            tc = parseInt(document.getElementById('inT').value);
            ac = parseInt(document.getElementById('inA').value);
            if (archers.length > 0 && tc > 0 && ac > 0) {
                ct = 1; ci = 0; as = 0;
                document.getElementById('s1').style.display = 'none';
                document.getElementById('s2').style.display = 'block';
                updateUI();
            } else { alert("Zadej terče, šípy a aspoň jednoho střelce!"); }
        }

        function bod(p) {
            lastVal = p; canUndo = true;
            let name = archers[ci];
            if (!targetLog[name][ct-1]) targetLog[name][ct-1] = [];
            targetLog[name][ct-1].push(p);
            scores[name] += p;
            hits[name][p]++;
            totalArrowsShot[name]++;
            as++;
            if (as >= ac) { as = 0; ci++; }
            if (ci >= archers.length) { ci = 0; ct++; }
            if (ct > tc) finishRace(); else updateUI();
        }

        function zpet() {
            if (!canUndo) return;
            if (ci == 0 && as == 0) {
                if (ct > 1) { ct--; ci = archers.length - 1; as = ac - 1; }
            } else if (as == 0) { ci--; as = ac - 1; } else { as--; }
            let name = archers[ci];
            targetLog[name][ct-1].pop();
            scores[name] -= lastVal;
            hits[name][lastVal]--;
            totalArrowsShot[name]--;
            canUndo = false;
            updateUI();
        }

        function updateUI() {
            let hue = (ct * 30 + ci * 60) % 360;
            let lightness = 93 - (as * 5); 
            document.body.style.backgroundColor = `hsl(${hue}, 60%, ${lightness}%)`;
            document.getElementById('info').innerHTML = "Terč: <span class='highlight'>" + ct + "</span> / " + tc + " | Šíp: " + (as+1) + " / " + ac;
            document.getElementById('who').innerHTML = archers[ci];
            document.getElementById('btnUndo').style.opacity = canUndo ? "1" : "0.2";
            let txt = "<b>PRŮBĚŽNÉ POŘADÍ:</b><br>";
            [...archers].sort((a,b) => scores[b] - scores[a]).forEach(n => {
                txt += `${n}: ${scores[n]} b.<br>`;
            });
            document.getElementById('res').innerHTML = txt;
        }

        function finishRace() {
            saveHistory();
            document.body.style.backgroundColor = "#fff";
            showHistory();
        }

        function saveHistory() {
            let h = JSON.parse(localStorage.getItem('archery_history') || "[]");
            let main = archers[0];
            let totalArrows = tc * ac;
            h.push({ 
                id: Date.now(),
                date: new Date().toLocaleDateString('cs-CZ'), 
                pts: scores[main], 
                avg: (scores[main] / totalArrows).toFixed(2),
                details: hits[main],
                targets: targetLog[main]
            });
            localStorage.setItem('archery_history', JSON.stringify(h));
        }

        function showHistory() {
            document.getElementById('s1').style.display = 'none';
            document.getElementById('s2').style.display = 'none';
            document.getElementById('sHistory').style.display = 'block';
            renderHistory();
        }

        function renderHistory() {
            let h = JSON.parse(localStorage.getItem('archery_history') || "[]");
            let displayData = [...h].reverse();
            
            let gHtml = ""; 
            let max = Math.max(...h.map(r => r.pts), 1);
            displayData.slice(0, 20).forEach((r, i) => {
                let barH = (r.pts / max) * 100;
                gHtml += `
                <div class="bar-wrapper">
                    <span class="bar-pts">${r.pts}</span>
                    <div class="bar ${i===0?'latest':''}" style="height:${barH}px"></div>
                    <span class="bar-label">${r.date.split('.')[0]}.${r.date.split('.')[1]}.</span>
                </div>`;
            });
            document.getElementById('graphContainer').innerHTML = gHtml;

            let lHtml = ""; 
            displayData.forEach(r => {
                let d = r.details || {11:0, 10:0, 8:0, 5:0, 0:0};
                let targetRows = "";
                if(r.targets) {
                    r.targets.forEach((t, idx) => {
                        let tSum = t.reduce((a, b) => a + b, 0);
                        targetRows += `<div class="detail-row"><span>Terč ${idx+1}</span><span>(${t.join(", ")})</span><b>${tSum} b.</b></div>`;
                    });
                }

                lHtml += `
                <div class="history-item" onclick="toggleDetail(${r.id})">
                    <div class="h-top" ontouchstart="startPress(${r.id})" ontouchend="stopPress()">
                        <div class="h-info">
                            <b>${r.date}</b>
                            <span class="h-hits">[11:${d[11]}|10:${d[10]}|8:${d[8]}|5:${d[5]}|0:${d[0]}]</span>
                        </div>
                        <div class="h-score">${r.pts}</div>
                    </div>
                    <div class="h-details" id="det-${r.id}" onclick="event.stopPropagation()">
                        ${targetRows}
                        <button class="share-btn-small" onclick="shareOne(${r.id})">SDÍLET TENTO ZÁVOD</button>
                    </div>
                </div>`;
            });
            document.getElementById('historyList').innerHTML = lHtml || "Žádné záznamy.";
        }

        function toggleDetail(id) {
            let el = document.getElementById('det-' + id);
            if (el) el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }

        function shareOne(id) {
            let h = JSON.parse(localStorage.getItem('archery_history') || "[]");
            let r = h.find(item => item.id === id);
            if (!r) return;

            let d = r.details;
            let text = `🎯 Lukostřelba - ${r.date}\n`;
            text += `Celkem: ${r.pts} b. (Ø ${r.avg})\n`;
            text += `Zásahy: [11:${d[11]} | 10:${d[10]} | 8:${d[8]} | 5:${d[5]} | 0:${d[0]}]\n\n`;
            text += `Rozpis terčů:\n`;
            r.targets.forEach((t, i) => {
                text += `T${i+1}: ${t.join(", ")} (${t.reduce((a,b)=>a+b,0)} b.)\n`;
            });

            if (navigator.share) {
                navigator.share({ title: 'Výsledek lukostřelby', text: text });
            } else {
                alert(text);
            }
        }

        function startPress(id) {
            pressTimer = setTimeout(() => {
                if (confirm("Smazat tento záznam?")) {
                    let h = JSON.parse(localStorage.getItem('archery_history') || "[]");
                    h = h.filter(item => item.id !== id);
                    localStorage.setItem('archery_history', JSON.stringify(h));
                    renderHistory();
                }
            }, 700);
        }

        function stopPress() { clearTimeout(pressTimer); }

        function goHome() {
            archers = []; scores = {}; hits = {}; totalArrowsShot = {}; targetLog = {};
            document.getElementById('listDisplay').innerHTML = "Střelci: žádní";
            document.getElementById('s2').style.display = 'none';
            document.getElementById('sHistory').style.display = 'none';
            document.getElementById('s1').style.display = 'block';
            document.body.style.backgroundColor = "#f4f4f9";
        }

        function clearAllHistory() {
            if (confirm("Opravdu smazat vše?")) {
                localStorage.removeItem('archery_history');
                renderHistory();
            }
        }

        function confirmExit() {
            if (confirm("Opravdu ukončit závod?")) goHome();
        }
    </script>
</body>
</html>
